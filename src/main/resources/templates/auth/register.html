<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - GanttPRO</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h1>📊 GanttPRO</h1>
            <h2>Создать аккаунт</h2>

            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <form method="post" action="/register" class="auth-form" th:object="${registerRequest}">
                <div class="form-group">
                    <label for="name">Имя:</label>
                    <input type="text" id="name" name="name" th:field="*{name}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" th:field="*{email}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" th:field="*{password}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердить пароль:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" th:field="*{confirmPassword}" required class="form-control">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>

            <p class="auth-footer">
                Уже есть аккаунт? <a href="/login">Войдите здесь</a>
            </p>
        </div>
    </div>
</body>
</html>
