<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - GanttPRO</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h1>📊 GanttPRO</h1>
            <h2>Вход в систему</h2>

            <div th:if="${param.success}" class="alert alert-success">
                <span th:text="${param.success[0]}"></span>
            </div>

            <div th:if="${param.error}" class="alert alert-error">
                Неверный email или пароль
            </div>

            <form method="post" action="/login" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required class="form-control" placeholder="demo@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required class="form-control" placeholder="demo123">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>

            <p class="auth-footer">
                Нет аккаунта? <a href="/register">Зарегистрируйтесь</a>
            </p>

            <div class="demo-credentials">
                <h3>📝 Тестовые учетные данные:</h3>
                <p><strong>Email:</strong> demo@example.com</p>
                <p><strong>Пароль:</strong> demo123</p>
            </div>
        </div>
    </div>
</body>
</html>
