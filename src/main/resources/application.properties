spring.application.name=ganttro-app

# Server
server.port=8080
server.servlet.context-path=/

# Database - H2 для разработки, можно переключить на PostgreSQL
spring.datasource.url=jdbc:h2:file:C:/Users/diana/OneDrive/Рабочий стол/GanttPRO/data/gantt;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (для разработки)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.com.ganttpro=DEBUG
