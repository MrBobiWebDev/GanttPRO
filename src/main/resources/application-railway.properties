spring.application.name=ganttro-app

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# Database - PostgreSQL на Railway
spring.datasource.url=${DATABASE_URL:postgresql://postgres:TRJssDCQwyTGlxkyDhncIolGZsiPIGvw@postgres.railway.internal:5432/railway}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.root=WARN
logging.level.com.ganttpro=INFO
logging.level.org.hibernate.SQL=DEBUG
